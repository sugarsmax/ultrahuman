name: Nightly Dashboard Update

on:
  schedule:
    # 9:00 AM PST
    - cron: "0 17 * * *"
    # 12:00 PM PST (New)
    - cron: "0 20 * * *"
    # 9:00 PM PST
    - cron: "0 5 * * *"
  workflow_dispatch: # allow manual trigger

env:
  # Opts into the Node 24 runtime now to suppress warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2 # Check for v5/v6 if warnings persist

      - name: Set up Python
        uses: actions/setup-python@v5.5.0 # Updated from v5 to latest patch/minor

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch last 4 weeks of metrics
        env:
          ULTRAHUMAN_API_TOKEN: ${{ secrets.ULTRAHUMAN_API_TOKEN }}
          ULTRAHUMAN_EMAIL: ${{ secrets.ULTRAHUMAN_EMAIL }}
        run: |
          mkdir -p data
          python scripts/ultrahuman_query_20251209.py \
            --weeks-back 4 \
            --output data/last_7_days.json

      - name: Generate charts
        run: |
          mkdir -p output
          python scripts/hr_charts_20251209.py --input data/last_7_days.json --week-offset 0
          python scripts/hr_charts_20251209.py --input data/last_7_days.json --week-offset 1
          python scripts/hr_charts_20251209.py --input data/last_7_days.json --week-offset 2
          python scripts/hr_charts_20251209.py --input data/last_7_days.json --week-offset 3

      - name: Extract and merge daily summaries
        run: python scripts/extract_daily_summaries_20260302.py --input data/last_7_days.json

      - name: Commit daily summaries
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/daily_summaries.json
          git diff --cached --quiet || git commit -m "chore: update daily summaries $(date +%Y-%m-%d)"
          git push

      - name: Build dashboard HTML
        run: python scripts/build_page_20260302.py --data data/last_7_days.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3.1.1 # Updated to latest patch

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5 # Updated from v4
